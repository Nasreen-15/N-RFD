{% extends "layouts/base.html" %}
{% block content %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>User Management</title>

<style>
    body { font-family: Arial, sans-serif; background:#f9f9f9; margin:0; padding:0; }

    /* Page Header */
    h2 { background:#2a6ebb; color:white; padding:16px 24px; font-size:22px; margin:0; }

    /* Tabs */
    .tabs { display:flex; gap:20px; padding:15px 30px; background:#fff; border-bottom:1px solid #ddd; }
    .tabs button { font-weight:bold; color:#333; background:none; border:none; cursor:pointer; font-size:15px; }
    .tabs button.active { color:#2a6ebb; border-bottom:2px solid #2a6ebb; }
    .tabs button:hover { color:#2a6ebb; }

    /* Form Section */
    .form-section { background:#fff; border:1px solid #ddd; border-radius:8px; padding:30px; max-width:900px; margin:30px auto; box-shadow:0 3px 8px rgba(0,0,0,0.1); }

    .row { display:flex; align-items:center; margin-bottom:20px; }
    label { width:200px; font-weight:bold; font-size:15px; color:#333; }
    input, select { flex:1; height:36px; padding:6px 10px; font-size:15px; border:1px solid #ccc; border-radius:5px; }

    .btn { background:#2a6ebb; color:white; border:none; padding:10px 24px; border-radius:5px; cursor:pointer; font-size:15px; margin-right:10px; }
    .btn:hover { background:#1f4f8a; }

    .green-btn { background:#28a745; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-size:15px; }
    .green-btn:hover { background:#218838; }

    .red-btn { background:#dc3545; color:white; border:none; padding:10px 24px; border-radius:5px; cursor:pointer; font-size:15px; }
    .red-btn:hover { background:#b52a37; }

    .section-title { font-size:18px; font-weight:bold; margin:25px 0 15px; color:#2a6ebb; }
</style>

<script>
    function showTab(tabId) {
        document.querySelectorAll('.form-section').forEach(section => section.style.display = 'none');
        document.getElementById(tabId).style.display = 'block';
        document.querySelectorAll('.tabs button').forEach(btn => btn.classList.remove('active'));
        document.querySelector('[data-tab="'+tabId+'"]').classList.add('active');
    }
</script>
</head>

<body>

<h2>User Management</h2>

<!-- Tabs -->
<div class="tabs">
    <button data-tab="add" class="active" onclick="showTab('add')">Add New</button>
    <button data-tab="delete" onclick="showTab('delete')">Delete</button>
    <button data-tab="update" onclick="showTab('update')">Update</button>
</div>

<!-- Add New User -->
<div id="add" class="form-section" style="display:block;">
    <div class="section-title">Add New User</div>
    <div class="row"><label>User Name:</label><input type="text"></div>
    <div class="row"><label>Full Name:</label><input type="text"></div>
    <div class="row"><label>Designation:</label><select><option>Select</option></select></div>
    <div class="row"><label>Email Id:</label><input type="email"></div>
    <div class="row"><label>Is Admin:</label><select><option>No</option><option>Yes</option></select></div>
    <div class="row"><label>User Type:</label><select><option>Select</option></select></div>
    <div class="btn-group">
        <button class="green-btn">Add</button>
        <button class="btn">Reset</button>
    </div>
</div>

<!-- Delete User -->
<div id="delete" class="form-section" style="display:none;">
    <div class="section-title">Delete User</div>
    <p>Please enter details here.</p>
    <div class="row"><label>User Name:</label><select><option>Select User</option></select></div>
    <button class="red-btn">Delete</button>
</div>

<!-- Update User -->
<div id="update" class="form-section" style="display:none;">
    <div class="section-title">Update User Details</div>
    <p>Please enter details here.</p>
    <div class="row"><label>User Name:</label><input type="text"></div>
    <div class="row"><label>Full Name:</label><input type="text"></div>
    <div class="row"><label>Designation:</label><select><option>Select</option></select></div>
    <div class="row"><label>Email Id:</label><input type="email"></div>
    <div class="row"><label>Is Admin:</label><select><option>No</option><option>Yes</option></select></div>
    <div class="row"><label>User Type:</label><select><option>Select</option></select></div>
    <div class="btn-group">
        <button class="green-btn">Update</button>
        <button class="btn">Reset</button>
    </div>

    <div class="section-title">Access To</div>
    <div class="row"><label>Access To:</label><select><option>Select</option></select></div>
    <div class="row"><label>Access Type:</label><select><option>Select</option></select></div>
    <div class="row"><label>Last Modified Date:</label><input type="text" value="13-02-2026 11:10:07 PM"></div>
    <button class="green-btn">Add</button>
</div>

</body>
</html>
{% endblock %}
