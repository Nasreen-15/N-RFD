{% extends "layouts/base.html" %}
{% block content %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>To Do List</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f9f9f9;
        margin: 0;
        padding: 0;
    }

    /* Page Header */
    h2 {
        background-color: #2a6ebb;
        color: white;
        padding: 16px 24px;
        font-size: 22px;
        margin: 0;
    }

    /* Form Section */
    .form-section {
        background-color: #ffffff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 30px;
        max-width: 900px;
        margin: 30px auto;
        box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    .row {
        display: flex;
        align-items: center;
        margin-bottom: 20px;
    }

    label {
        width: 180px;
        font-weight: bold;
        font-size: 15px;
        color: #333;
    }

    select, input {
        flex: 1;
        height: 36px;
        padding: 6px 10px;
        font-size: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    .btn-group {
        margin: 25px 0;
        display: flex;
        gap: 15px;
    }

    .btn {
        background-color: #2a6ebb;
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 15px;
        transition: background-color 0.2s ease;
    }

    .btn:hover {
        background-color: #1f4f8a;
    }

    .export-btn {
        background-color: #28a745;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 15px;
        transition: background-color 0.2s ease;
    }

    .export-btn:hover {
        background-color: #218838;
    }
</style>
</head>

<body>

<!-- Page Header -->
<h2>TO DO LIST</h2>

<div class="form-section">
    <!-- Customer ID -->
    <div class="row">
        <label>Customer ID :</label>
        <select>
            <option>Select ID</option>
            <option>1001</option>
            <option>1002</option>
        </select>
    </div>

    <!-- Customer Name -->
    <div class="row">
        <label>Customer Name :</label>
        <input type="text" placeholder="Enter customer name">
    </div>

    <!-- Item No -->
    <div class="row">
        <label>Item No :</label>
        <select>
            <option>Select Item</option>
            <option>Item 1</option>
            <option>Item 2</option>
        </select>
    </div>

    <!-- Buttons -->
    <div class="btn-group">
        <button class="btn">To Do List Simple</button>
        <button class="btn">To Do List Normal</button>
        <button class="btn">To Do List Complex</button>
    </div>

    <!-- Export Path -->
    <div class="row">
        <label>Export File Path :</label>
        <input type="text" placeholder="Enter export path">
    </div>

    <!-- To-Do Dropdown & Export Button -->
    <div class="row">
        <label>To-Do List :</label>
        <select>
            <option>Select Status</option>
            <option>Pending</option>
            <option>Completed</option>
        </select>

        <button class="export-btn">Export Pending To-Do Dump</button>
    </div>
</div>

</body>
</html>
{% endblock %}
